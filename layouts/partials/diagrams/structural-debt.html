<svg viewBox="0 0 640 250" role="img" aria-labelledby="sd-t sd-d" xmlns="http://www.w3.org/2000/svg">
  <title id="sd-t">Structural debt</title>
  <desc id="sd-d">One class of problem is solved independently by several functions, each building its own tooling, governance and skills. The duplication compounds.</desc>

  <!-- one class of problem -->
  <rect class="stroke-dash" x="235" y="20" width="170" height="40" rx="2"/>
  <text class="t-strong t-small" x="320" y="44" text-anchor="middle">One class of problem</text>

  <!-- fan-out arrows -->
  <line class="stroke-muted" x1="320" y1="60" x2="135" y2="104"/>
  <line class="stroke-muted" x1="320" y1="60" x2="320" y2="104"/>
  <line class="stroke-muted" x1="320" y1="60" x2="505" y2="104"/>

  <!-- three duplicated stacks -->
  <!-- A -->
  <text class="t-strong t-small" x="135" y="100" text-anchor="middle">Function A</text>
  <rect class="fill-surface" x="70" y="112" width="130" height="30"/>
  <text class="t-small" x="135" y="131" text-anchor="middle">Tooling</text>
  <rect class="fill-surface" x="70" y="148" width="130" height="30"/>
  <text class="t-small" x="135" y="167" text-anchor="middle">Governance</text>
  <rect class="fill-surface" x="70" y="184" width="130" height="30"/>
  <text class="t-small" x="135" y="203" text-anchor="middle">Skills</text>
  <!-- B -->
  <text class="t-strong t-small" x="320" y="100" text-anchor="middle">Function B</text>
  <rect class="fill-surface" x="255" y="112" width="130" height="30"/>
  <text class="t-small" x="320" y="131" text-anchor="middle">Tooling</text>
  <rect class="fill-surface" x="255" y="148" width="130" height="30"/>
  <text class="t-small" x="320" y="167" text-anchor="middle">Governance</text>
  <rect class="fill-surface" x="255" y="184" width="130" height="30"/>
  <text class="t-small" x="320" y="203" text-anchor="middle">Skills</text>
  <!-- C -->
  <text class="t-strong t-small" x="505" y="100" text-anchor="middle">Function C</text>
  <rect class="fill-surface" x="440" y="112" width="130" height="30"/>
  <text class="t-small" x="505" y="131" text-anchor="middle">Tooling</text>
  <rect class="fill-surface" x="440" y="148" width="130" height="30"/>
  <text class="t-small" x="505" y="167" text-anchor="middle">Governance</text>
  <rect class="fill-surface" x="440" y="184" width="130" height="30"/>
  <text class="t-small" x="505" y="203" text-anchor="middle">Skills</text>

  <text class="t-accent t-small" x="320" y="238" text-anchor="middle">Same problem, three stacks &#8212; the interest is paid every quarter</text>
</svg>
