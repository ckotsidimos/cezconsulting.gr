<svg viewBox="0 0 640 290" role="img" aria-labelledby="ai-t ai-d" xmlns="http://www.w3.org/2000/svg">
  <title id="ai-t">Three ways to engage, by intensity</title>
  <desc id="ai-d">Strategic Diagnostics is the lowest-intensity engagement and the usual entry point into an ongoing Executive Advisory Retainer; Transformation Leadership and Counsel is the highest intensity.</desc>
  <defs>
    <marker id="ai-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="fill-accent"/>
    </marker>
  </defs>

  <!-- bars (rise = intensity) -->
  <rect class="fill-band-strong" x="70" y="140" width="140" height="90"/>
  <rect class="fill-accent" x="70" y="140" width="140" height="4"/>
  <rect class="fill-band-strong" x="250" y="90" width="140" height="140"/>
  <rect class="fill-accent" x="250" y="90" width="140" height="4"/>
  <rect class="fill-band-strong" x="430" y="45" width="140" height="185"/>
  <rect class="fill-accent" x="430" y="45" width="140" height="4"/>

  <!-- entry-point arrow: diagnostics -> retainer -->
  <path class="stroke" marker-end="url(#ai-arrow)" d="M140,132 Q190,96 248,108"/>
  <text class="t-small" x="150" y="120" text-anchor="start">often the entry point</text>

  <!-- baseline -->
  <line class="stroke-muted" x1="60" y1="230" x2="590" y2="230"/>

  <!-- labels -->
  <text class="t-strong t-small" x="140" y="250" text-anchor="middle">Strategic</text>
  <text class="t-strong t-small" x="140" y="266" text-anchor="middle">Diagnostics</text>
  <text class="t-strong t-small" x="320" y="250" text-anchor="middle">Executive Advisory</text>
  <text class="t-strong t-small" x="320" y="266" text-anchor="middle">Retainer</text>
  <text class="t-strong t-small" x="500" y="250" text-anchor="middle">Transformation</text>
  <text class="t-strong t-small" x="500" y="266" text-anchor="middle">Leadership &amp; Counsel</text>

  <text class="t-accent t-small" x="590" y="284" text-anchor="end">engagement intensity &#8594;</text>
</svg>
