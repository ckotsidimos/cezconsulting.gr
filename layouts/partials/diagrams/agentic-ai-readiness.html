<svg viewBox="0 0 640 300" role="img" aria-labelledby="ar-t ar-d" xmlns="http://www.w3.org/2000/svg">
  <title id="ar-t">Agentic AI readiness: five dimensions and the result bands</title>
  <desc id="ar-d">Five dimensions are tested. The result is the number of weak-signal answers, read against three bands: nought to one is calibration, two to three is the most dangerous because it feels covered, four to five needs structural repair.</desc>

  <!-- five dimensions -->
  <g>
    <circle class="fill-surface" cx="90" cy="48" r="22"/>
    <text class="t-accent" x="90" y="54" text-anchor="middle">1</text>
    <text class="t-small" x="90" y="89" text-anchor="middle">Oversight</text>
    <text class="t-small" x="90" y="104" text-anchor="middle">functions</text>

    <circle class="fill-surface" cx="200" cy="48" r="22"/>
    <text class="t-accent" x="200" y="54" text-anchor="middle">2</text>
    <text class="t-small" x="200" y="89" text-anchor="middle">Escalation</text>
    <text class="t-small" x="200" y="104" text-anchor="middle">destination</text>

    <circle class="fill-surface" cx="310" cy="48" r="22"/>
    <text class="t-accent" x="310" y="54" text-anchor="middle">3</text>
    <text class="t-small" x="310" y="89" text-anchor="middle">Diagnostic</text>
    <text class="t-small" x="310" y="104" text-anchor="middle">ownership</text>

    <circle class="fill-surface" cx="420" cy="48" r="22"/>
    <text class="t-accent" x="420" y="54" text-anchor="middle">4</text>
    <text class="t-small" x="420" y="89" text-anchor="middle">Delayering</text>
    <text class="t-small" x="420" y="104" text-anchor="middle">exposure</text>

    <circle class="fill-surface" cx="530" cy="48" r="22"/>
    <text class="t-accent" x="530" y="54" text-anchor="middle">5</text>
    <text class="t-small" x="530" y="89" text-anchor="middle">Reversibility</text>
  </g>

  <!-- result bands -->
  <text class="t-strong t-small" x="70" y="152" text-anchor="start">Result: number of weak-signal answers</text>

  <text class="t-accent t-small" x="156" y="184" text-anchor="middle">0&#8211;1</text>
  <text class="t-accent t-small" x="329" y="184" text-anchor="middle">2&#8211;3</text>
  <text class="t-accent t-small" x="503" y="184" text-anchor="middle">4&#8211;5</text>

  <rect class="fill-band" x="70" y="194" width="173" height="48"/>
  <rect class="fill-band-strong" x="243" y="194" width="173" height="48"/>
  <rect class="fill-accent" x="416" y="194" width="174" height="48"/>

  <text class="t-small" x="156" y="223" text-anchor="middle">calibration</text>
  <text class="t-strong t-small" x="329" y="217" text-anchor="middle">feels covered</text>
  <text class="t-small" x="329" y="232" text-anchor="middle">most dangerous</text>
  <text class="t-small" x="503" y="223" text-anchor="middle" fill="#ffffff">structural repair</text>

  <text class="t-small" x="70" y="276" text-anchor="start">Count the dimensions where your honest answer lands on the weak signal.</text>
</svg>
