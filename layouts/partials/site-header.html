<header class="site-header">
  <div class="container site-header__inner">
    <a class="site-brand" href="/" aria-label="{{ site.Title }} home">
      <svg class="site-brand__mark" width="26" height="26" viewBox="0 0 28 28" aria-hidden="true" focusable="false">
        <line x1="5" y1="23" x2="24" y2="6" stroke="#1e3a5f" stroke-width="2.6" stroke-linecap="round"/>
        <line x1="5" y1="23" x2="24" y2="18" stroke="#1f2933" stroke-width="2.6" stroke-linecap="round"/>
      </svg>
      <span class="site-brand__word">CEZ Consulting</span>
    </a>
    <button class="nav-toggle" type="button" aria-label="Toggle navigation menu" aria-controls="primary-nav" aria-expanded="false">
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
    </button>
    <nav class="site-nav" id="primary-nav" aria-label="Primary navigation">
      {{ range site.Menus.main }}
        <a href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
