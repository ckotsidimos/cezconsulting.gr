<div class="cookie-consent" id="cookie-consent" role="dialog" aria-label="Cookie consent" hidden>
  <p class="cookie-consent__text">This site uses analytics cookies to understand how it is used, only if you allow it. See the <a href="/privacy/">privacy notice</a>.</p>
  <div class="cookie-consent__actions">
    <button type="button" class="cookie-consent__btn" id="cookie-decline">Decline</button>
    <button type="button" class="cookie-consent__btn cookie-consent__btn--accept" id="cookie-accept">Accept</button>
  </div>
</div>
<script>
  (function () {
    var el = document.getElementById('cookie-consent');
    if (!el) return;
    var stored = null;
    try { stored = localStorage.getItem('cez-analytics-consent'); } catch (e) {}
    if (!stored) { el.hidden = false; }
    function choose(value) {
      try { localStorage.setItem('cez-analytics-consent', value); } catch (e) {}
      if (value === 'granted' && typeof gtag === 'function') {
        gtag('consent', 'update', { 'analytics_storage': 'granted' });
      }
      el.hidden = true;
    }
    document.getElementById('cookie-accept').addEventListener('click', function () { choose('granted'); });
    document.getElementById('cookie-decline').addEventListener('click', function () { choose('denied'); });
  })();
</script>
