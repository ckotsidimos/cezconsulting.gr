{{ define "main" }}
  <section class="section">
    <div class="container container--narrow">
      <p class="eyebrow">{{ site.Title }}</p>
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p class="lede">{{ . }}</p>{{ end }}
      {{ with .Pages }}
        <div class="page-list">
          {{ range . }}
            <a class="page-list__item" href="{{ .RelPermalink }}">
              <h2 class="page-list__title">{{ .Title }}</h2>
              {{ with .Params.summary }}<p class="page-list__summary">{{ . }}</p>{{ end }}
              <p class="page-list__date">{{ .Date.Format "2 Jan 2006" }}</p>
            </a>
          {{ end }}
        </div>
      {{ end }}
    </div>
  </section>
{{ end }}
